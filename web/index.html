<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轻量级物联网加密通信协议</title>
    <link rel="stylesheet" href="/web/styles.css">
  </head>
  <body>
    <main class="terminal-shell" aria-label="轻量级物联网加密通信协议网页版终端">
      <header class="terminal-titlebar">
        <div>
          <h1>轻量级物联网加密通信协议</h1>
          <p>网页版控制台</p>
        </div>
        <span class="status-dot" aria-label="运行中"></span>
      </header>

      <nav class="menu-grid" aria-label="主菜单">
        <button type="button" data-action="send">1. 发送数据</button>
        <button type="button" data-action="history">2. 查看历史</button>
        <button type="button" data-action="protocol">3. 协议说明</button>
        <button type="button" data-action="exit">4. 退出</button>
      </nav>

      <section class="terminal-output" id="terminal-output" aria-live="polite"></section>
    </main>

    <script type="module" src="/web/app.js"></script>
  </body>
</html>
